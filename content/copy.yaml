live:
  hero:
    eyebrow: "ASTR 1020K · Stars & Galaxies"
    title: "Astronomy's Future Compute"
    subtitle: "Where should future large-scale compute live, and what would each choice cost astronomy?"
    dek: >-
      Astronomy increasingly depends on massive computing infrastructure to find faint signals,
      process large surveys, and manage expanding archives. This project compares three concurrent
      siting domains for future compute—land, underwater, and orbit—and asks which burdens each one
      reduces, which new burdens it creates, and why that matters for astronomy.
    primaryCta: "Read the paper"
    secondaryCta: "Open research appendix"
    cards:
      - title: "Large sky surveys"
        body: "Modern sky surveys produce huge data streams that must be searched for rare or faint signals."
      - title: "Radio and multi-wavelength data"
        body: "Astronomy now depends on large archives, cross-matching, and compute-heavy pipelines across multiple observing modes."
      - title: "Orbital environment"
        body: "Some future compute ideas may help process data, but they can also change the conditions under which astronomy takes place."
  need:
    title: "Why astronomy needs more compute"
    intro: >-
      Modern astronomy is increasingly a search problem. Large surveys, archive-scale datasets,
      and multi-wavelength pipelines require scientists to identify rare, faint, or short-lived
      signals inside enormous volumes of data.
    cards:
      - title: "Needle-in-a-haystack science"
        body: "Wide-field surveys and large archives make astronomy increasingly dependent on filtering, classification, and anomaly detection at scale."
      - title: "Rubin"
        body: "Rubin expects about 20 TB of data per night, which makes rapid data processing and triage essential for time-domain astronomy."
      - title: "SKAO"
        body: "SKAO expects more than 700 PB of archived data per year, which shows how tightly modern astronomy is coupled to major compute infrastructure."
  context:
    title: "Why the siting question exists"
    intro: >-
      The siting question arises because conventional data centers already face real pressure from
      electricity demand, cooling, water use, and land constraints. As computing demand grows, the
      issue is no longer only how to build more compute, but where that compute should live and
      who bears the environmental cost.
    baselineTitle: "Baseline pressure on conventional data centers"
    astronomyCardTitle: "Why this remains an astronomy topic"
    astronomyCardBody: >-
      Astronomy is both a major user of large computing systems and a field that can be harmed
      by the way future compute infrastructure is built.
    comparisonCardTitle: "What this comparison actually is"
    comparisonCardBody: >-
      This project compares land-based, underwater, and orbital data-center paths as concurrent
      infrastructure options. That framing is more useful for astronomy than treating the issue
      as a race between companies or countries.
  bridge:
    title: "From observation to siting"
    intro: "Why a compute-siting question is an astronomy question."
    steps:
      - label: "Observation"
        body: "Wide-field optical, radio, and multi-wavelength surveys look for rare, faint, or short-lived signals."
      - label: "Data deluge"
        body: "≈20 TB / night at Rubin. >700 PB / year archived at SKAO. Archives grow faster than human inspection can keep up."
      - label: "Compute dependence"
        body: "Filtering, classification, cross-matching, and rapid transient follow-up now live inside large compute pipelines."
      - label: "Siting pressure"
        body: "Grid, cooling, water, and land constraints push proposals for alternative data-center siting."
      - label: "Feedback to the sky"
        body: "Some of those siting choices — especially orbital infrastructure — can directly alter optical, infrared, and radio observing conditions."
  responses:
    title: "Three siting paths"
    intro: >-
      The key question is not only which option is efficient. It is which burdens each option
      reduces and which burdens it shifts elsewhere.
    bestCaseLabel: "Potential advantage:"
    mainConstraintLabel: "Main constraint:"
    tableHeader: "Comparison axis"
    note: "A deeper research appendix expands the evidence, case studies, and full source trail."
    rows:
      - label: "What it mainly protects"
        land: "Fastest reduction in existing grid and cooling waste"
        underwater: "Direct freshwater use and some land pressure"
        orbital: "Space-native compute goals, in principle"
      - label: "What it mainly shifts"
        land: "Still relies on terrestrial grids, water, and siting"
        underwater: "Marine ecology, seabed, and maintenance burdens"
        orbital: "Sky brightness, radio environment, debris, and launch burden"
      - label: "Evidence maturity"
        land: "High"
        underwater: "Medium"
        orbital: "Low to medium"
      - label: "Astronomy consequence"
        land: "Mostly indirect"
        underwater: "Mostly indirect"
        orbital: "Direct and central"
  underwater:
    title: "Underwater systems: credible engineering, limited deployment"
    intro: >-
      Underwater systems are the most credible alternative after land-based efficiency because they
      have real pilot deployments and measurable cooling advantages. Their main appeal is reduced
      freshwater dependence and improved thermal performance, but those gains are traded for harder
      maintenance, marine permitting, and ecological uncertainty.
    prosTitle: "What the evidence supports"
    limitsTitle: "What still limits this path"
    pros:
      - "Natick Phase 1 reported PUE 1.07 and WUE 0 at prototype scale."
      - "Natick Phase 2 later reported a server failure rate one-eighth that of a land-based control group."
      - "Chinese Hainan and Lingang projects suggest underwater cooling has moved beyond a single Microsoft experiment."
      - "For astronomy, underwater systems matter mainly because they may reduce some Earth-side pressure without directly affecting the observing environment."
    limits:
      - "Microsoft confirmed Natick is no longer an active deployment program, which weakens the case for mainstream scaling."
      - "Sealed lights-out pods conflict with the rapid refresh cycle of modern servers and accelerators."
      - "Biofouling, corrosion, cable burial, and marine permitting move environmental and operational risk into the ocean."
      - "The strongest current case is for niche or coastal-edge use, not for replacing all land-based hyperscale compute."
    astronomyTitle: "Why astronomy should care"
    astronomyBody: >-
      For astronomy, underwater systems matter mainly as a comparison case. They may relieve some
      Earth-side infrastructure pressure without directly altering the observing environment
      itself.
  orbital:
    title: "Orbital systems: most consequential for astronomy, least mature at scale"
    intro: >-
      Of the three siting domains, orbital computing is the least mature and the most consequential
      for astronomy. It is attractive because of abundant solar energy and the possibility of
      processing space-based data close to where that data is generated. But evidence for
      large-scale deployment remains limited.
    prosTitle: "What seems plausible now"
    limitsTitle: "Why large-scale Earth use remains weak"
    pros:
      - "If the data is already in space, on-orbit processing may be the most efficient place to handle it."
      - "China has launched the first 12 satellites of its Three-Body Computing Constellation."
      - "Proposals for orbital computing emphasize abundant solar energy and the possibility of relieving some of the cooling and grid strain that terrestrial data centers put on the planet."
    limits:
      - "Vacuum does not eliminate heat; it changes the problem into one of radiator area and thermal rejection. Radiation, launch mass, replacement cadence, and space-to-ground data movement all make Earth-scale AI training in orbit remain speculative."
    chartTitle: "Relative implications for astronomy by pathway"
    cardOneTitle: "Observing conditions, not only engineering"
    cardOneBody: >-
      For astronomy, orbital systems are not only an engineering question. They are also an
      observing-environment question, because orbital infrastructure can directly affect optical,
      infrared, and radio observations.
    cardTwoTitle: "Why this matters for ASTR 1020K"
    cardTwoBody: >-
      For this course, the key issue is whether any computing benefit would justify worsening the
      conditions needed to observe faint objects, wide-field surveys, and weak signals.
  conclusion:
    title: "What the evidence suggests for astronomy"
    intro: >-
      The most useful conclusion is not that one futuristic option simply wins. It is that
      astronomy changes how we judge the tradeoff. Dark, stable, and predictable observing
      conditions are part of astronomy's working environment. Land-based efficiency remains the
      strongest near-term path because it addresses existing infrastructure burdens without
      directly degrading the sky. Underwater systems are worth tracking where cooling and
      freshwater constraints are especially strong. Orbital systems are the most important
      comparison for this course because they create the sharpest direct tradeoff between
      computing ambition and observing conditions.
    bullets: []
    bestFitTitle: "How this presentation is organized"
    bestFitBody: >-
      The presentation begins with astronomy's growing dependence on compute, then explains why
      siting has become a real infrastructure question, and finally compares land, underwater,
      and orbital systems through the lens of burden-shifting and observing impact.
    atlasTitle: "Research appendix"
    atlasBody: "The research appendix includes the fuller timeline, case-study detail, and extended bibliography."
  references:
    title: "Core sources for the presentation"
    intro: "These sources support the main presentation. The research appendix preserves the broader evidence base and additional case-study material."
    footer: "This reference list is intentionally short for live presentation use. The research appendix retains the fuller bibliography."

rubric:
  studentHeader:
    title: "Astronomy's Future Compute"
    subtitle: "Comparing land-based, underwater, and orbital data-center paths for modern astronomy"
    authorsLabel: "Authors"
    classLabel: "Class"
    assignmentLabel: "Assignment"
    dateLabel: "Term"
  publicEmptyBanner: "Student-authored section to be finalized before submission."
  topicSummary:
    title: "Topic summary"
    tag: "Overview"
    # STUDENT-AUTHORED. Leave body empty until the student writes it. Public
    # pages show a calm "to be finalized before submission" note; append
    # ?draft=1 to the URL to reveal the author prompt during drafting.
    body: |
      Modern observational astronomy is one reason compute siting has become a real scientific infrastructure question. Wide-field surveys, time-domain alerting, archival reanalysis, and multi-wavelength cross-matching have turned observation into a data-intensive pipeline, and the science does not exist until the compute has run. That makes astronomy one of the clearest cases where compute is not an accessory to observation but part of it — which forces a question astronomy does not usually ask: where should all of this compute physically live, and whose environment absorbs the consequences of putting it there?

      The reflexive answer has been to build more land-based data centers, and that is where growth is actually happening. Global data-center electricity demand is on track to roughly double between 2024 and 2030, colliding with grid capacity, freshwater cooling limits, and local siting politics. Three regimes are now being pursued in parallel rather than in sequence — land, underwater, and orbit — as concurrent burden-shifting strategies for power, heat, water, maintenance, and environmental externality. Recent milestones make the comparison concrete: Microsoft's Project Natick was deployed in 2018, retrieved in 2020, and confirmed discontinued in 2024; China's Three-Body Computing Constellation launched its first twelve satellites in May 2025; and Starcloud placed the first data-center-class GPU in orbit in November 2025 before filing an FCC proposal in February 2026 for a constellation of up to 88,000 orbital-compute satellites. These are the transition from whitepaper to hardware, and they are what makes the siting question concrete rather than theoretical.
    authorPrompt: "Explain, in your own words, that this project compares where future large-scale compute might live — on land, underwater, or in orbit — and asks which burdens each option reduces or shifts."
  astronomyRelevance:
    title: "Why this matters for astronomy"
    tag: "Course relevance"
    body: |
      Observational astronomy is now one of the most compute-dependent sciences in practice, not in principle. Wide-field surveys generate terabytes per night and petabyte-scale archives over their lifetimes. Time-domain alerting requires real-time difference imaging so that short-lived events — supernovae, kilonovae, tidal disruptions, near-Earth objects — can trigger follow-up before they fade. Archival search re-interrogates decades of observations for faint or unusual signals invisible in the original reduction. Multi-wavelength cross-matching joins optical, infrared, radio, X-ray, and gravitational-wave catalogs so a single source can be studied across the spectrum. Radio astronomy produces some of the largest raw data volumes in any science; instruments in the SKA class are designed around the compute infrastructure that can ingest them, not the other way around. In each case, the observation itself is incomplete until the compute has run. Once that is true, compute siting stops being an engineering story happening offstage and becomes a question astronomy has a direct stake in.

      This fits ASTR 1020K because the course is ultimately about how we know what we know about the universe, and that chain now runs through the data pipeline as much as it runs through the telescope. It matters especially for this comparison because one of the three siting regimes — orbital — is the only one whose externality is deposited directly into the observing environment astronomy depends on. The International Astronomical Union established the Centre for the Protection of the Dark and Quiet Sky in 2022 for exactly this reason. A 2025 Nature study forecasts that if currently proposed constellations fly, more than 96% of exposures from future low-Earth-orbit space telescopes could carry satellite trails, and LOFAR has already detected unintended electromagnetic emission from Starlink satellites bleeding into the 150.05–153 MHz band the ITU protects for radio astronomy. These are not hypothetical costs. They are the costs the siting decision lands on.
    authorPrompt: "Explain how astronomy depends on large-scale computing for surveys, archives, and signal-finding, and why orbital compute matters especially because it can alter the observing environment itself."
  futureImpact:
    title: "Future impact"
    tag: "Looking ahead"
    body: |
      Once observation is what drives compute demand, the next question is forced rather than optional: which of the three regimes actually fits the burdens it claims to move? The three will coexist, but not on equal terms, and the differences come down to maturity, reversibility, and who absorbs the externality. Land-based systems will stay dominant in the near term because they have the strongest evidence base, the clearest efficiency path — liquid cooling, heat reuse, siting near low-carbon generation — and the most developed regulatory surface. The constraint is not that the technology fails; it is that grid capacity, water, and siting politics do not scale linearly with demand. Underwater is best read as a specialized option rather than a general replacement. Natick proved the engineering case for reliability and freshwater-free cooling, but sealed capsules cannot absorb modern GPU refresh cycles, and Microsoft's decision to stop building subsea systems is itself part of the evidence. The regime may survive in narrow coastal, water-constrained geographies as a niche shape rather than a universal one.

      Orbital compute is the most uncertain regime and, for astronomy specifically, the most consequential. The appeal is real: near-continuous solar input, radiative cooling to the deep-space sink, and no direct freshwater or terrestrial-siting cost. The problem is that the proposed scales — gigawatt-class facilities with kilometers-per-side solar and radiator structures — are more than an order of magnitude beyond anything humans have ever assembled in space, and there is no established operational model for heat rejection, repair, GPU refresh, or debris management at that scale. And the externality lands exactly where astronomy is least able to absorb it. More satellites in low Earth orbit means more optical trails across survey exposures, more unintended radio emission into protected bands, and tighter constraints on the observing windows and frequencies that ground- and space-based astronomy rely on.
    authorPrompt: "Explain what seems most plausible near-term, what should be watched longer-term, and what the broader consequences could be beyond this course."
  recommendation:
    title: "Recommendation"
    tag: "Closing argument"
    body: |
      The strongest near-term path is to make land-based compute cleaner and more efficient where it already exists, to treat underwater deployments as a limited coastal option rather than a general solution, and to approach large-scale orbital compute with closer scrutiny than enthusiasm. This is not a bias against ambitious infrastructure. It is a response to a mismatch between maturity and consequence. Land has the strongest evidence and the most immediate payoff. Underwater has genuine engineering credibility but unresolved upgrade, retrieval, and ecological exposure, and Microsoft's own exit is an informative data point. Orbital has the lowest maturity and simultaneously the most direct impact on astronomy, because its externality is emitted straight into the observing environment rather than offloaded somewhere else on Earth.

      The standard this project applies is that future compute should be judged not just by how much capacity it promises, but by which burdens it shifts, how well those new burdens are understood, and whether the scientific or environmental costs fall on people and fields that did not choose the tradeoff. By that standard, the cleanest near-term move is to improve land-based infrastructure where it already sits. Underwater is worth watching in the narrow geographies where its advantages are real and bounded. Orbital deserves the closest scrutiny, not because it is obviously impossible, but because it raises the hardest question astronomy has to answer in the next decade: how much pressure on the sky and the radio spectrum are we willing to accept in exchange for more computation?
    authorPrompt: "State which path you would prioritize, monitor, or treat cautiously, and why."
  milestones:
    title: "Key dates and milestones"
    intro: "These milestones anchor the comparison in documented developments rather than speculation."
    items:
      - year: "2018–2020"
        label: "Microsoft Project Natick Phase 2: 864-server underwater pod off Orkney reports roughly one-eighth the failure rate of a matched land control group. Pod retrieved in 2020; never taken to production."
      - year: "2023"
        label: "Microsoft publicly confirms that Natick is no longer an active deployment program and remains research only."
      - year: "2024–2025"
        label: "IEA and LBNL updated forecasts show data-center electricity demand roughly doubling by 2030, driven largely by AI workloads."
      - year: "2025"
        label: "Orbital-compute demonstrator ventures announce plans and early launches; independent technical validation at scale remains thin."
      - year: "ongoing"
        label: "Rubin Observatory and SKAO operations intersect with Starlink and Kuiper megaconstellation growth; optical trail contamination and radio sidelobes are documented in AAS / SATCON and A&A reports."
  comparisonMatrix:
    title: "Land vs underwater vs orbital at a glance"
    intro: >-
      This comparison is the project's main map. Land, underwater, and orbital systems are not
      stages of one evolution; they are concurrent siting domains with different tradeoffs for
      power, cooling, maintenance, bandwidth, environmental impact, and astronomy.
    axisHeader: "Axis"
    columns:
      - "Land"
      - "Underwater"
      - "Orbital"
    rows:
      - axis: "Power source"
        land: "Grid plus PPAs; bottlenecked by interconnect queues"
        underwater: "Grid via subsea cable; adjacent offshore wind possible"
        orbital: "Solar; near-continuous in sun-synchronous orbit"
      - axis: "Cooling"
        land: "Air plus evaporative water; large freshwater draw at many sites"
        underwater: "Seawater heat exchange; no freshwater use"
        orbital: "Radiative only; hard thermodynamic ceiling"
      - axis: "Maintenance"
        land: "Routine, cheap, well understood"
        underwater: "Sealed pod; no in-situ repair; fail-in-place"
        orbital: "Effectively none; launch-and-forget"
      - axis: "Bandwidth to users"
        land: "Terrestrial fiber; lowest latency"
        underwater: "Subsea cable landing; near-terrestrial latency"
        orbital: "Laser or RF downlink; bounded by ground-station passes"
      - axis: "Primary externality"
        land: "Freshwater, grid strain, and land use"
        underwater: "Local marine thermal and ecological impacts; retrieval unknowns"
        orbital: "Launch emissions, debris, and radio/optical sky impact"
      - axis: "Astronomy impact"
        land: "Indirect (site water, RFI near facilities)"
        underwater: "Low to unknown"
        orbital: "Direct: optical trails, radio sidelobes, debris risk"
      - axis: "Evidence maturity"
        land: "Mature operational record"
        underwater: "Research only; one retrieved demonstrator"
        orbital: "Early; speculative at scale"
